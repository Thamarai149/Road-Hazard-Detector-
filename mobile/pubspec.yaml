name: ai_road_hazard_detector
description: AI Road Hazard Detector - Complete car implementation with real-time detection
publish_to: 'none'
version: 1.0.0

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  
  # UI & Icons
  cupertino_icons: ^1.0.6
  google_fonts: ^6.1.0
  flutter_animate: ^4.5.0
  
  # Camera & Image Processing
  camera: ^0.10.5+5
  image: ^4.1.3
  
  # Location & GPS
  geolocator: ^10.1.0
  location: ^5.0.3
  geocoding: ^2.1.1
  
  # Maps
  flutter_map: ^6.1.0
  latlong2: ^0.9.0
  
  # HTTP & Networking
  http: ^1.1.0
  dio: ^5.4.0
  
  # Text-to-Speech
  flutter_tts: ^3.8.5
  
  # State Management
  provider: ^6.1.1
  
  # Local Storage
  shared_preferences: ^2.2.2
  sqflite: ^2.3.0
  path_provider: ^2.1.1
  
  # Permissions
  permission_handler: ^11.1.0
  
  # JSON & Data
  json_annotation: ^4.8.1
  
  # Utils
  intl: ^0.18.1
  uuid: ^4.2.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1
  json_serializable: ^6.7.1
  build_runner: ^2.4.7
  flutter_launcher_icons: ^0.13.1

flutter:
  uses-material-design: true
  
  # Assets
  assets:
    - assets/images/
    - assets/fonts/
  
  # Fonts
  fonts:
    - family: Montserrat
      fonts:
        - asset: assets/fonts/MontserratBlack-3zOvZ.ttf
          weight: 900


# App Icon Configuration
flutter_launcher_icons:
  android: true
  ios: false
  image_path: "assets/images/app_icon.png"
  adaptive_icon_background: "#ffffff"
  adaptive_icon_foreground: "assets/images/app_icon.png"
