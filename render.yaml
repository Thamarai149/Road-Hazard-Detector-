services:
  - type: web
    name: road-hazard-detector
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: RENDER_EXTERNAL_URL
        sync: false   # set this manually in Render dashboard to your service URL
    healthCheckPath: /health
